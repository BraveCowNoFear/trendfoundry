name: Run TrendFoundry operations

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: trendfoundry-daily-ops
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_OWNER: BraveCowNoFear
  GITHUB_REPO: trendfoundry
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  operate:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run operations
        run: npm run operate

      - name: Commit refreshed product files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git add docs/issues site/issues
          if git diff --cached --quiet; then
            echo "No tracked product changes to commit."
            exit 0
          fi
          git commit -m "Run scheduled TrendFoundry operations"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
