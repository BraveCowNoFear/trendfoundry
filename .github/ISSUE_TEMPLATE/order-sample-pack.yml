name: Order or request a sample pack
description: Request a TrendFoundry sample pack or ask for a custom weekly brief.
title: "Sample pack request: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in TrendFoundry. This form is for sample-pack requests and custom brief inquiries.

        The paid pack includes 12 source-backed opportunities, one scene-by-scene ready-to-record script, CSV planning files, and quality-risk notes.

        Do not include passwords, payment card details, private IDs, or sensitive account information.
  - type: input
    id: creator_channel
    attributes:
      label: Creator channel or team
      description: Your channel, team, or public profile URL.
      placeholder: "https://www.youtube.com/@... or https://space.bilibili.com/..."
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Primary platform
      options:
        - Bilibili
        - YouTube
        - Both Bilibili and YouTube
        - Other
    validations:
      required: true
  - type: dropdown
    id: pack_type
    attributes:
      label: What do you want?
      options:
        - USD 9 sample issue
        - USD 19/month weekly brief
        - USD 49/month custom niche brief
        - I want to see the free sample first
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email, GitHub handle, or another public contact route.
      placeholder: "email@example.com"
    validations:
      required: true
  - type: dropdown
    id: delivery_route
    attributes:
      label: Preferred delivery route
      description: Choose where you want payment/delivery details handled after the request is reviewed.
      options:
        - Email
        - GitHub issue comment
        - Other public contact route
    validations:
      required: true
  - type: textarea
    id: niche
    attributes:
      label: Niche or topic preference
      description: Tell us what kind of AI/developer topics you want in the brief.
      placeholder: "AI agents for office workflows, open-source video tools, coding agents..."
    validations:
      required: false
  - type: checkboxes
    id: safety_acknowledgement
    attributes:
      label: Safety acknowledgement
      options:
        - label: I will not post payment card details, passwords, private IDs, or sensitive account information in this issue.
          required: true
        - label: I understand TrendFoundry is a creator planning aid and does not guarantee views, subscribers, revenue, or platform growth.
          required: true
